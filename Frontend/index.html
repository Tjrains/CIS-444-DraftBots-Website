<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DraftBots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">✓✓</span>
      <span class="logo-text">DraftBots</span>
    </div>
    <div class="header-balance" id="headerBalance">Balance: $0.00</div>
  </header>

  <nav>
    <button class="tab active" onclick="openTab('schedule', this)">Schedule</button>
    <button class="tab" onclick="openTab('teams', this)">Teams</button>
    <button class="tab" onclick="openTab('bets', this)">My Bets</button>
    <button class="tab" onclick="openTab('profile', this)">Profile</button>
  </nav>

  <main>

    <section id="schedule" class="tab-content active">
      <h2 class="section-title">Upcoming Games</h2>
      <div id="gameList" class="game-grid"></div>
    </section>

    <section id="gameDetails" class="tab-content hidden">
      <button class="back-btn" onclick="goBack()">← Back to Schedule</button>
      <h2 id="gameTitle" class="section-title"></h2>
      <div id="gameStatusBadge"></div>
      <div id="gameContent" class="game-content"></div>
    </section>

    <section id="teams" class="tab-content">
      <h2 class="section-title">Teams</h2>
      <div id="teamGrid" class="team-grid"></div>
    </section>

    <section id="bets" class="tab-content">
      <h2 class="section-title">My Bets</h2>
      <div id="betsList">
        <p class="empty-msg">No bets placed yet. Head to the Schedule to place a bet!</p>
      </div>
    </section>

    <section id="profile" class="tab-content">
      <h2 class="section-title">Profile</h2>
      <div class="profile-card">
        <div class="profile-header">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="profile-meta">
            <p class="profile-username" id="username">Loading...</p>
            <p class="profile-email" id="email"></p>
            <span class="status-badge" id="status"></span>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-box">
            <span class="stat-label">Balance</span>
            <span class="stat-value green" id="balance">$0.00</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Member Since</span>
            <span class="stat-value" id="createdAt">—</span>
          </div>
        </div>
      </div>
      <h3 class="sub-title">Recent Transactions</h3>
      <ul id="transactionList" class="transaction-list"></ul>
    </section>

  </main>

</body>
</html>
